<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predation Arcade: 50-Gate Challenge</title>
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --neon-pink: #ff00e5;
            --dark-bg: #0a0b10;
            --card-bg: #1a1c26;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
        }

        header {
            text-align: center;
            padding: 30px;
            background: linear-gradient(180deg, #161822 0%, var(--dark-bg) 100%);
            width: 100%;
            border-bottom: 2px solid var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
        }

        h1 { margin: 0; font-size: 2.5em; letter-spacing: 4px; text-transform: uppercase; text-shadow: 0 0 10px var(--neon-cyan); }
        .game-info { color: var(--neon-pink); font-weight: bold; letter-spacing: 2px; margin-top: 5px; }

        #board {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            padding: 20px;
            max-width: 1400px;
            width: 95%;
        }

        .category-header {
            text-align: center;
            font-weight: bold;
            font-size: 0.9em;
            color: var(--neon-cyan);
            padding: 15px 5px;
            text-transform: uppercase;
            border-bottom: 2px solid #333;
            background: rgba(0, 242, 255, 0.05);
        }

        .cell {
            background: var(--card-bg);
            border: 1px solid #333;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2em;
            font-weight: bold;
            color: var(--neon-pink);
            cursor: pointer;
            transition: all 0.2s ease;
            border-radius: 4px;
        }

        .cell:hover {
            transform: translateY(-3px);
            border-color: var(--neon-pink);
            background: #252839;
        }

        .cell.viewed { opacity: 0.15; cursor: default; transform: none; }

        #modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98);
            z-index: 100;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 40px;
            box-sizing: border-box;
        }

        #modal-content { max-width: 900px; text-align: center; }
        #question-text { font-size: 2em; margin-bottom: 30px; color: #fff; }
        #answer-text { font-size: 1.8em; color: var(--neon-cyan); display: none; margin-bottom: 30px; padding: 20px; border: 1px solid var(--neon-cyan); border-radius: 10px; }
        
        .score-container {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--card-bg);
            padding: 15px 25px;
            border: 2px solid var(--neon-pink);
            border-radius: 8px;
            font-size: 1.2em;
            z-index: 50;
        }

        button {
            background: transparent;
            border: 2px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 12px 24px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            margin: 5px;
        }

        button:hover { background: var(--neon-cyan); color: var(--dark-bg); }
    </style>
</head>
<body>

<header>
    <h1>PREDATION ARCADE</h1>
    <div class="game-info">BIOLOGY CHAPTER 14 // 50-QUESTION MODE</div>
</header>

<div class="score-container">SCORE: $<span id="score">0</span></div>

<div id="board">
    <div class="category-header">Forms of Predation</div>
    <div class="category-header">Lotka-Volterra Lab</div>
    <div class="category-header">Responses & Dynamics</div>
    <div class="category-header">Evolutionary Arms Race</div>
    <div class="category-header">The Smart Predator</div>
</div>

<div id="modal">
    <div id="modal-content">
        <div id="question-text">Question?</div>
        <div id="answer-text">Answer!</div>
        <div>
            <button id="reveal-btn" onclick="reveal()">Reveal</button>
            <button onclick="closeModal(true)">Correct</button>
            <button onclick="closeModal(false)">Incorrect</button>
        </div>
    </div>
</div>

<script>
    const gameData = [
        // Category 0: Forms
        {v:100, c:0, q:"Heterotrophs that consume animal tissue.", a:"What are Carnivores?"},
        {v:200, c:0, q:"Heterotrophs that consume plant or algal tissue.", a:"What are Herbivores?"},
        {v:300, c:0, q:"This group is excluded from the definition of predation because they eat dead organic matter.", a:"What are Scavengers or Decomposers?"},
        {v:400, c:0, q:"A predator that kills its prey immediately upon capture.", a:"What is a True Predator?"},
        {v:500, c:0, q:"Herbivores that consume only part of a plant without killing it are often called these two terms.", a:"What are Grazers and Browsers?"},
        {v:600, c:0, q:"These function as true predators because they kill the 'prey' by consuming the entire embryo.", a:"What are Seed Predators?"},
        {v:700, c:0, q:"An organism that lives on or in a host, drawing nutrients but usually not killing it.", a:"What is a Parasite?"},
        {v:800, c:0, q:"This organism lays eggs in or on a host, and its larvae eventually consume and kill the host.", a:"What is a Parasitoid?"},
        {v:900, c:0, q:"Zooplankton that consume phytoplankton are known as this.", a:"What are Planktivores?"},
        {v:1000, c:0, q:"Predation is described as this type of interaction because it influences the fitness of both populations.", a:"What is a Direct Interaction?"},

        // Category 1: Lotka-Volterra
        {v:100, c:1, q:"The 'r' in the prey equation represents this rate.", a:"What is Per Capita Growth Rate?"},
        {v:200, c:1, q:"In the equation dN/dt = rN - (cN)P, this term represents the total rate of predation.", a:"What is (cN)P?"},
        {v:300, c:1, q:"The 'c' in the equation represents this efficiency.", a:"What is Capture Efficiency?"},
        {v:400, c:1, q:"Predator population growth is dependent on this, which is the ability to turn food into offspring.", a:"What is Birth Efficiency (b)?"},
        {v:500, c:1, q:"This variable represents the predator's per capita death rate.", a:"What is d?"},
        {v:600, c:1, q:"The prey population is stable when the number of predators equals this value.", a:"What is r/c?"},
        {v:700, c:1, q:"When plotted, the predator and prey populations show this distinct temporal relationship.", a:"What is a Cycle (or Lag)?"},
        {v:800, c:1, q:"The diagonal line on a graph where population growth is zero is called this.", a:"What is a Zero-Growth Isocline?"},
        {v:900, c:1, q:"The Lotka-Volterra model assumes this type of 'response' from predators to prey density.", a:"What is a Linear (Type I) Response?"},
        {v:1000, c:1, q:"If 'c' increases, the prey isocline moves in this direction on the graph.", a:"What is Downward?"},

        // Category 2: Responses
        {v:100, c:2, q:"The relationship between the per capita rate of consumption and prey density.", a:"What is a Functional Response?"},
        {v:200, c:2, q:"This response type shows a linear increase in consumption up to a maximum.", a:"What is Type I?"},
        {v:300, c:2, q:"The most common response, where consumption rate decelerates as prey density increases.", a:"What is Type II?"},
        {v:400, c:2, q:"This response type is S-shaped (Sigmoidal).", a:"What is Type III?"},
        {v:500, c:2, q:"The time a predator spends 'processing' a prey item.", a:"What is Handling Time?"},
        {v:600, c:2, q:"This describes predators moving toward areas of high prey density.", a:"What is the Aggregative Response?"},
        {v:700, c:2, q:"The increase in predator reproduction due to increased prey consumption.", a:"What is the Numerical Response?"},
        {v:800, c:2, q:"Predators often ignore rare prey until they develop this mental shortcut.", a:"What is a Search Image?"},
        {v:900, c:2, q:"In Type II, this factor limits the predator's ability to eat more at high densities.", a:"What is Handling Time?"},
        {v:1000, c:2, q:"This occurs when prey take refuge in areas where they are safe from predators.", a:"What is a Prey Refuge?"},

        // Category 3: Defenses
        {v:100, c:3, q:"Armor, shells, and quills are examples of this type of defense.", a:"What are Structural (or Mechanical) Defenses?"},
        {v:200, c:3, q:"The scientific term for camouflage or blending into the background.", a:"What is Cryptic Coloration?"},
        {v:300, c:3, q:"Bright, bold warning colors signaling toxicity.", a:"What is Aposematism?"},
        {v:400, c:3, q:"When a harmless species looks like a toxic one.", a:"What is Batesian Mimicry?"},
        {v:500, c:3, q:"When many unpalatable species share the same color pattern.", a:"What is Müllerian Mimicry?"},
        {v:600, c:3, q:"Plant compounds like lignin and tannins that reduce digestibility are called these.", a:"What are Quantitative Inhibitors?"},
        {v:700, c:3, q:"Toxins like alkaloids and cyanogenic glycosides in plants are called these.", a:"What are Qualitative Inhibitors?"},
        {v:800, c:3, q:"These defenses are only produced by a plant when it is being attacked.", a:"What are Induced Defenses?"},
        {v:900, c:3, q:"The 'flashing' of a white tail by a deer is an example of this defense.", a:"What is a Behavioral Defense (Warning Signal)?"},
        {v:1000, c:3, q:"Pheromones released by injured animals to warn others are called this.", a:"What are Alarm Pheromones?"},

        // Category 4: Smart Predator
        {v:100, c:4, q:"The highest number of individuals that can be harvested without causing a population crash.", a:"What is Maximum Sustainable Yield?"},
        {v:200, c:4, q:"MSY is typically found at this point on a population growth curve.", a:"What is Half of the Carrying Capacity (K/2)?"},
        {v:300, c:4, q:"This fish population famously collapsed in the 1940s-50s due to overfishing and ENSO.", a:"What is the Pacific Sardine?"},
        {v:400, c:4, q:"Over-exploitation often shifts the population toward these age classes.", a:"What are Younger Age Classes?"},
        {v:500, c:4, q:"This force often drives managers to maintain high yields even when populations are declining.", a:"What is Economic Pressure?"},
        {v:600, c:4, q:"Sustainable yield requires a detailed understanding of this ratio within a population.", a:"What is the Sex Ratio?"},
        {v:700, c:4, q:"Environmental uncertainties like these can interrupt normal reproduction patterns.", a:"What is Climate Variation (or ENSO)?"},
        {v:800, c:4, q:"Why is focusing only on the current yield considered short-sighted?", a:"What is it leads to long-term population collapse (and economic loss)?"},
        {v:900, c:4, q:"Sustainable harvest requires understanding reproduction that is dependent on these two factors.", a:"What are Size and Age?"},
        {v:1000, c:4, q:"This term describes a predator that understands the dynamics and limits of its prey population.", a:"What is a Smart Predator?"}
    ];

    let currentScore = 0;
    let activeVal = 0;
    const board = document.getElementById('board');

    // Generate cells
    for(let i=1; i<=10; i++) {
        for(let j=0; j<5; j++) {
            const item = gameData.find(d => d.v === i*100 && d.c === j);
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.innerText = `$${item.v}`;
            cell.onclick = () => {
                if(cell.classList.contains('viewed')) return;
                activeVal = item.v;
                document.getElementById('question-text').innerText = item.q;
                document.getElementById('answer-text').innerText = item.a;
                document.getElementById('answer-text').style.display = 'none';
                document.getElementById('reveal-btn').style.display = 'inline-block';
                document.getElementById('modal').style.display = 'flex';
                cell.classList.add('viewed');
            };
            board.appendChild(cell);
        }
    }

    function reveal() {
        document.getElementById('answer-text').style.display = 'block';
        document.getElementById('reveal-btn').style.display = 'none';
    }

    function closeModal(win) {
        if(win) currentScore += activeVal;
        else currentScore -= activeVal;
        document.getElementById('score').innerText = currentScore;
        document.getElementById('modal').style.display = 'none';
    }
</script>

</body>
</html>
