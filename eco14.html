<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accessible Predation Arcade</title>
    <style>
        :root {
            --dark-bg: #121212;
            --card-bg: #1e1e1e;
            --neon-cyan: #00e5ff;
            --neon-pink: #ff00d4;
            --text-main: #ffffff;
            --focus-outline: #ffffff;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-main);
            font-family: Arial, sans-serif; /* High legibility font */
            line-height: 1.6;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .skip-link {
            position: absolute;
            left: -10000px;
            top: auto;
            width: 1px;
            height: 1px;
            overflow: hidden;
        }
        .skip-link:focus {
            position: static;
            width: auto;
            height: auto;
            background: var(--neon-pink);
            color: black;
            padding: 10px;
        }

        header {
            text-align: center;
            padding: 20px;
            border-bottom: 3px solid var(--neon-cyan);
            width: 100%;
        }

        #game-board {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            padding: 20px;
            max-width: 1000px;
            width: 95%;
        }

        .cat-label {
            text-align: center;
            font-weight: bold;
            color: var(--neon-cyan);
            padding: 10px;
            border-bottom: 2px solid #444;
            text-transform: uppercase;
        }

        .quiz-cell {
            background: var(--card-bg);
            border: 2px solid #444;
            color: var(--neon-pink);
            height: 60px;
            font-size: 1.3em;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.2s;
        }

        .quiz-cell:hover, .quiz-cell:focus {
            background: #333;
            border-color: var(--neon-cyan);
            outline: 3px solid var(--focus-outline);
        }

        .quiz-cell[aria-disabled="true"] {
            opacity: 0.2;
            cursor: not-allowed;
        }

        /* Modal / Dialog Styling */
        #dialog-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        #question-dialog {
            background: var(--card-bg);
            padding: 30px;
            border: 4px solid var(--neon-cyan);
            max-width: 600px;
            width: 90%;
            border-radius: 10px;
            text-align: center;
        }

        .answer-options {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .opt-btn {
            background: #2a2a2a;
            color: white;
            border: 2px solid var(--neon-cyan);
            padding: 15px;
            font-size: 1.1em;
            cursor: pointer;
            border-radius: 8px;
        }

        .opt-btn:focus {
            background: var(--neon-cyan);
            color: black;
            outline: 4px solid white;
        }

        .score-display {
            background: var(--card-bg);
            padding: 15px;
            border: 2px solid var(--neon-pink);
            margin: 20px;
            font-size: 1.5em;
        }

        #announcer {
            position: absolute;
            left: -10000px;
        }
    </style>
</head>
<body>

    <a class="skip-link" href="#game-board">Skip to Game Board</a>

    <header>
        <h1>Predation Arcade: Chapter 14</h1>
        <p>Use Tab to navigate and Enter to select questions.</p>
    </header>

    <section class="score-display" aria-label="Current Score">
        SCORE: $<span id="score-val">0</span>
    </section>

    <div id="announcer" aria-live="assertive"></div>

    <main id="game-board" role="grid" aria-label="Jeopardy Board">
        <div role="columnheader" class="cat-label">Forms</div>
        <div role="columnheader" class="cat-label">Equations</div>
        <div role="columnheader" class="cat-label">Dynamics</div>
        <div role="columnheader" class="cat-label">Defenses</div>
        <div role="columnheader" class="cat-label">Sustainability</div>

        </main>

    <div id="dialog-overlay" role="dialog" aria-labelledby="q-title" aria-modal="true">
        <div id="question-dialog">
            <h2 id="q-title">Question</h2>
            <div id="question-text" style="font-size: 1.4em; margin-bottom: 20px;"></div>
            
            <div class="answer-options" id="options-container" role="radiogroup" aria-label="Select an answer">
                </div>

            <button id="close-btn" style="margin-top:30px; display:none; padding:10px 20px;" onclick="closeDialog()">Return to Board</button>
        </div>
    </div>

<script>
    const questions = [
        // Category 0: Forms
        {v:100, c:0, q:"True or False: The definition of predation excludes scavengers and decomposers.", a:"True", d:["False"]},
        {v:200, c:0, q:"Heterotrophs that consume only animal tissue are known as...", a:"Carnivores", d:["Herbivores", "Omnivores", "Detritivores"]},
        {v:300, c:0, q:"Which type of predator kills its prey immediately upon capture?", a:"True Predator", d:["Parasite", "Parasitoid", "Grazer"]},
        {v:400, c:0, q:"Herbivores like cattle that eat grass are functionally classified as...", a:"Grazers", d:["Browsers", "Planktivores", "Carnivores"]},
        {v:500, c:0, q:"Organisms that consume the entire plant embryo within a seed are...", a:"Seed Predators", d:["Browsers", "Parasites", "Decomposers"]},
        {v:600, c:0, q:"This organism lives in or on a host, drawing nutrients without immediately killing it.", a:"Parasite", d:["True Predator", "Scavenger", "Omnivore"]},
        {v:700, c:0, q:"An organism whose larvae eventually consume and kill the host.", a:"Parasitoid", d:["Endoparasite", "Ectoparasite", "Commensal"]},
        {v:800, c:0, q:"Small organisms that consume phytoplankton are called...", a:"Planktivores", d:["Granivores", "Frugivores", "Browsers"]},
        {v:900, c:0, q:"Predation is a direct interaction that affects the ______ of both populations.", a:"Fitness", d:["Coloration", "Geography", "Taxonomy"]},
        {v:1000, c:0, q:"Heterotrophs that consume both plant and animal tissue.", a:"Omnivores", d:["Carnivores", "Herbivores", "Planktivores"]},

        // Category 1: Equations (Lotka-Volterra)
        {v:100, c:1, q:"In the prey equation, 'r' stands for...", a:"Per capita growth rate", d:["Capture efficiency", "Death rate", "Carrying capacity"]},
        {v:200, c:1, q:"In the term (cN)P, 'c' represents...", a:"Capture efficiency", d:["Carrying capacity", "Consumption energy", "Clumping"]},
        {v:300, c:1, q:"The term (cN)P represents the total rate of...", a:"Predation", d:["Birth", "Migration", "Excretion"]},
        {v:400, c:1, q:"Variable 'b' represents the efficiency of turning food into...", a:"Offspring", d:["Heat", "Waste", "Movement"]},
        {v:500, c:1, q:"Variable 'd' represents the predator's per capita...", a:"Death rate", d:["Dispersal rate", "Density", "Digestion time"]},
        {v:600, c:1, q:"Predator population growth is zero when prey density (N) equals...", a:"d / bc", d:["r / c", "K", "r / b"]},
        {v:700, c:1, q:"Prey population growth is zero when predator density (P) equals...", a:"r / c", d:["d / bc", "K", "b / r"]},
        {v:800, c:1, q:"Lotka-Volterra models assume which type of functional response?", a:"Type I", d:["Type II", "Type III", "S-Shaped"]},
        {v:900, c:1, q:"The populations move in a 'lagged' fashion, resulting in a...", a:"Cycle", d:["Straight line", "Square", "Random walk"]},
        {v:1000, c:1, q:"Lines on a graph where population growth is zero are called...", a:"Zero-growth isoclines", d:["Equilibrium slopes", "Asymptotes", "Log-lines"]},

        // Category 2: Dynamics
        {v:100, c:2, q:"The relationship between consumption rate and prey density.", a:"Functional Response", d:["Numerical Response", "Total Response", "Aggregative Response"]},
        {v:200, c:2, q:"Response type where consumption is linear until a maximum.", a:"Type I", d:["Type II", "Type III", "Sigmoid"]},
        {v:300, c:2, q:"The most common response, where rate decelerates due to handling.", a:"Type II", d:["Type I", "Type III", "Exponential"]},
        {v:400, c:2, q:"The sigmoidal (S-shaped) functional response.", a:"Type III", d:["Type I", "Type II", "Hyperbolic"]},
        {v:500, c:2, q:"Time spent catching, killing, and eating one prey item.", a:"Handling time", d:["Search time", "Foraging time", "Refuge time"]},
        {v:600, c:2, q:"Movement of predators into areas of high prey density.", a:"Aggregative response", d:["Numerical response", "Functional response", "Kin selection"]},
        {v:700, c:2, q:"Increased predator reproduction following increased food intake.", a:"Numerical response", d:["Functional response", "Total response", "Isocline response"]},
        {v:800, c:2, q:"A mental shortcut used by predators to spot common prey.", a:"Search image", d:["Cryptic map", "Refuge logic", "Aposematism"]},
        {v:900, c:2, q:"A safe place where prey cannot be reached by predators.", a:"Prey refuge", d:["Search image", "Trench", "Boundary"]},
        {v:1000, c:2, q:"In Type II, what factor limits consumption at high prey density?", a:"Handling time", d:["Prey birth rate", "Search time", "Ambush time"]},

        // Category 3: Defenses
        {v:100, c:3, q:"Armor, shells, and quills are examples of _______ defenses.", a:"Mechanical", d:["Chemical", "Behavioral", "Cryptic"]},
        {v:200, c:3, q:"Coloration that helps an animal blend into its background.", a:"Cryptic Coloration", d:["Aposematism", "Mimicry", "Disruptive"]},
        {v:300, c:3, q:"Bold warning colors on toxic animals.", a:"Aposematism", d:["Crypsis", "Shadowing", "Counter-shading"]},
        {v:400, c:3, q:"A harmless species looking like a toxic one.", a:"Batesian Mimicry", d:["Müllerian Mimicry", "Aggressive Mimicry", "Sematism"]},
        {v:500, c:3, q:"Two or more toxic species sharing the same pattern.", a:"Müllerian Mimicry", d:["Batesian Mimicry", "Cryptic Mimicry", "Inductive Mimicry"]},
        {v:600, c:3, q:"Plant toxins like alkaloids are _______ inhibitors.", a:"Qualitative", d:["Quantitative", "Induced", "Constitutive"]},
        {v:700, c:3, q:"Plant compounds like tannins that slow digestion are _______ inhibitors.", a:"Quantitative", d:["Qualitative", "Cyanogenic", "Alkaloid"]},
        {v:800, c:3, q:"Defenses triggered only after an attack occurs.", a:"Induced defenses", d:["Constitutive defenses", "Passive defenses", "Fixed defenses"]},
        {v:900, c:3, q:"Chemicals released by injured animals to warn others.", a:"Alarm pheromones", d:["Kairomones", "Hormones", "Enzymes"]},
        {v:1000, c:3, q:"Flashing a white tail by a deer is which type of defense?", a:"Behavioral", d:["Structural", "Chemical", "Mimicry"]},

        // Category 4: Sustainability
        {v:100, c:4, q:"The highest harvest possible without a population crash.", a:"Maximum Sustainable Yield", d:["Carrying Capacity", "Minimal Yield", "Biomass Peak"]},
        {v:200, c:4, q:"Mathematically, MSY occurs at which population point?", a:"K / 2", d:["K", "K / 4", "0.1 K"]},
        {v:300, c:4, q:"Which fish population crashed in the 1940s due to overfishing?", a:"Pacific Sardine", d:["Atlantic Cod", "Sockeye Salmon", "Bluefin Tuna"]},
        {v:400, c:4, q:"Heavy exploitation often shifts the population to _______ age classes.", a:"Younger", d:["Older", "Sterile", "Non-reproductive"]},
        {v:500, c:4, q:"Sustainable harvest requires understanding the _____ ratio.", a:"Sex", d:["Height", "Weight", "Latitude"]},
        {v:600, c:4, q:"What climate event contributed to the Sardine collapse?", a:"ENSO (El Niño)", d:["Tsunami", "Drought", "Polar Vortex"]},
        {v:700, c:4, q:"Pressure to increase yield for money is known as _______ pressure.", a:"Economic", d:["Genetic", "Atmospheric", "Social"]},
        {v:800, c:4, q:"True or False: It is easy to harvest only those individuals who would die naturally.", a:"False", d:["True"]},
        {v:900, c:4, q:"A 'Smart Predator' bases harvest on understanding population _______.", a:"Dynamics", d:["Taxonomy", "Names", "Locations"]},
        {v:1000, c:4, q:"After the Sardine population crashed, did it recover quickly?", a:"No", d:["Yes"]},
    ];

    let score = 0;
    const board = document.getElementById('game-board');
    const announcer = document.getElementById('announcer');
    let lastFocusedElement;

    // Build the accessible board
    for (let row = 1; row <= 10; row++) {
        for (let col = 0; col < 5; col++) {
            const q = questions.find(item => item.v === row * 100 && item.c === col);
            const btn = document.createElement('button');
            btn.className = 'quiz-cell';
            btn.setAttribute('aria-label', `Category ${col + 1}, ${q.v} dollars`);
            btn.innerText = `$${q.v}`;
            btn.onclick = () => openQuestion(q, btn);
            board.appendChild(btn);
        }
    }

    function openQuestion(q, btn) {
        if (btn.getAttribute('aria-disabled') === 'true') return;
        lastFocusedElement = btn;
        
        document.getElementById('q-title').innerText = `Question for $${q.v}`;
        document.getElementById('question-text').innerText = q.q;
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        const choices = [q.a, ...q.d].sort(() => Math.random() - 0.5);
        
        choices.forEach(choice => {
            const opt = document.createElement('button');
            opt.className = 'opt-btn';
            opt.innerText = choice;
            opt.onclick = () => evaluateAnswer(choice, q.a, q.v, opt);
            container.appendChild(opt);
        });

        document.getElementById('dialog-overlay').style.display = 'flex';
        document.getElementById('close-btn').style.display = 'none';
        container.querySelector('button').focus();
    }

    function evaluateAnswer(choice, correct, value, btn) {
        const allBtns = document.querySelectorAll('.opt-btn');
        allBtns.forEach(b => b.disabled = true);

        if (choice === correct) {
            score += value;
            announcer.innerText = "Correct! Your score is now " + score;
            btn.style.background = "#2e7d32";
        } else {
            score -= value;
            announcer.innerText = "Incorrect. The correct answer was " + correct + ". Your score is now " + score;
            btn.style.background = "#c62828";
        }

        document.getElementById('score-val').innerText = score;
        document.getElementById('close-btn').style.display = 'block';
        document.getElementById('close-btn').focus();
        
        lastFocusedElement.setAttribute('aria-disabled', 'true');
        lastFocusedElement.style.opacity = "0.2";
    }

    function closeDialog() {
        document.getElementById('dialog-overlay').style.display = 'none';
        lastFocusedElement.focus();
    }
</script>
</body>
</html>
