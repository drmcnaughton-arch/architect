<!DOCTYPE html>
<html>
<head>
<style>
  :root {
    --skin: #f3d0b1;
    --shirt: #1a1a1a;
    --shorts: #6b7c93;
    --shoes: #b32121;
  }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: linear-gradient(to bottom, #e0f0ff, #ffffff);
    margin: 0;
  }

  .avatar {
    position: relative;
    width: 200px;
    height: 400px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Head & Face */
  .head {
    width: 70px;
    height: 90px;
    background: var(--skin);
    border-radius: 40% 40% 50% 50%;
    position: relative;
    z-index: 5;
  }

  .glasses {
    position: absolute;
    top: 35px;
    left: 5px;
    width: 60px;
    height: 20px;
    border-top: 3px solid #333;
    display: flex;
    justify-content: space-between;
  }

  .lens {
    width: 24px;
    height: 18px;
    border: 3px solid #333;
    border-radius: 4px;
  }

  .smile {
    position: absolute;
    bottom: 15px;
    left: 20px;
    width: 30px;
    height: 10px;
    border-bottom: 3px solid #b5835a;
    border-radius: 50%;
  }

  /* Body */
  .torso {
    width: 90px;
    height: 110px;
    background: var(--shirt);
    border-radius: 10px 10px 0 0;
    margin-top: -5px;
    position: relative;
    display: flex;
    justify-content: center;
    z-index: 4;
  }

  .alien-logo {
    width: 25px;
    height: 30px;
    background: #4ef037;
    border-radius: 50% 50% 40% 40%;
    margin-top: 20px;
    position: relative;
  }

  /* Arms Crossed */
  .arm-left, .arm-right {
    position: absolute;
    width: 70px;
    height: 15px;
    background: var(--shirt);
    top: 40px;
    border-radius: 10px;
  }
  .arm-left { left: -10px; transform: rotate(20deg); }
  .arm-right { right: -10px; transform: rotate(-20deg); z-index: 6; }

  /* Legs & Shoes */
  .legs-container {
    display: flex;
    gap: 10px;
  }

  .leg {
    width: 30px;
    height: 80px;
    background: var(--shorts);
  }

  .lower-leg {
    width: 20px;
    height: 60px;
    background: var(--skin);
    margin-left: 5px;
  }

  .shoe {
    width: 45px;
    height: 20px;
    background: var(--shoes);
    border-radius: 5px 15px 5px 5px;
    border-bottom: 5px solid white;
    margin-left: -5px;
  }
</style>
</head>
<body>

<div class="avatar">
  <div class="head">
    <div class="glasses">
      <div class="lens"></div>
      <div class="lens"></div>
    </div>
    <div class="smile"></div>
  </div>
  
  <div class="torso">
    <div class="alien-logo"></div>
    <div class="arm-left"></div>
    <div class="arm-right"></div>
  </div>

  <div class="legs-container">
    <div class="leg-set">
      <div class="leg"></div>
      <div class="lower-leg"></div>
      <div class="shoe"></div>
    </div>
    <div class="leg-set">
      <div class="leg"></div>
      <div class="lower-leg"></div>
      <div class="shoe"></div>
    </div>
  </div>
</div>

</body>
</html>
